<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dumont">
<title>Dumont — Inventory</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --cream: #FDF6EC;
  --caramel: #C8843A;
  --dark: #1A1209;
  --mocha: #3D2B1F;
  --rose: #E8A598;
  --mint: #7BBFA5;
  --gold: #D4A843;
  --red-alert: #C0392B;
  --amber-alert: #E67E22;
  --green-ok: #27AE60;
  --card-bg: #FFFDF8;
  --border: #EDE0CC;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--cream); color:var(--dark); min-height:100vh; }

/* ── LOGIN SCREEN ── */
#loginScreen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(145deg,#1A1209 0%,#3D2B1F 50%,#1A1209 100%);
  padding:24px;
}
.login-box {
  background:rgba(253,246,236,0.04); border:1px solid rgba(200,132,58,0.3);
  border-radius:20px; padding:40px 32px; width:100%; max-width:380px;
  backdrop-filter:blur(20px); text-align:center;
}
.login-logo { font-family:'Playfair Display',serif; font-size:36px; color:#D4A843; font-weight:900; letter-spacing:-1px; }
.login-sub { color:rgba(253,246,236,0.6); font-size:13px; margin-top:4px; margin-bottom:32px; letter-spacing:1px; text-transform:uppercase; }
.login-box input {
  width:100%; padding:14px 16px; border-radius:10px; border:1px solid rgba(200,132,58,0.3);
  background:rgba(253,246,236,0.06); color:#FDF6EC; font-size:15px; margin-bottom:12px;
  outline:none; font-family:inherit;
}
.login-box input:focus { border-color:var(--caramel); }
.login-box input::placeholder { color:rgba(253,246,236,0.35); }
.btn-login {
  width:100%; padding:15px; border-radius:10px; border:none; cursor:pointer;
  background:linear-gradient(135deg,#C8843A,#D4A843); color:#1A1209;
  font-size:15px; font-weight:600; font-family:inherit; margin-top:4px; letter-spacing:0.3px;
  transition:opacity 0.2s;
}
.btn-login:hover { opacity:0.9; }
.login-error { color:#E8A598; font-size:13px; margin-top:10px; min-height:18px; }
.login-loading { color:rgba(253,246,236,0.5); font-size:13px; margin-top:10px; }

/* ── MAIN APP ── */
#app { display:none; }

/* HEADER */
.header {
  background:var(--mocha); color:var(--cream); padding:0 16px;
  display:flex; align-items:center; justify-content:space-between;
  height:56px; position:sticky; top:0; z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.header-logo { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); font-weight:700; }
.header-right { display:flex; align-items:center; gap:12px; }
.store-badge {
  background:rgba(212,168,67,0.2); border:1px solid rgba(212,168,67,0.4);
  color:var(--gold); font-size:11px; font-weight:600; padding:4px 10px;
  border-radius:20px; letter-spacing:0.5px; text-transform:uppercase;
}
.btn-logout {
  background:rgba(232,165,152,0.15); border:1px solid rgba(232,165,152,0.3);
  color:var(--rose); font-size:12px; padding:5px 10px; border-radius:8px;
  cursor:pointer; font-family:inherit; font-weight:500;
}
.header-sync { font-size:11px; color:rgba(253,246,236,0.5); }

/* OWNER TOGGLE (admin only) */
.owner-toggle-bar {
  background:var(--dark); padding:8px 16px; display:flex; gap:8px; overflow-x:auto;
  border-bottom:1px solid rgba(212,168,67,0.2);
}
.store-tab-btn {
  background:rgba(212,168,67,0.1); border:1px solid rgba(212,168,67,0.2);
  color:rgba(253,246,236,0.7); font-size:12px; font-weight:500; padding:6px 14px;
  border-radius:20px; cursor:pointer; font-family:inherit; white-space:nowrap;
  transition:all 0.2s;
}
.store-tab-btn.active { background:var(--caramel); color:#fff; border-color:var(--caramel); }

/* TABS */
.tabs {
  display:flex; background:var(--card-bg); border-bottom:2px solid var(--border);
  overflow-x:auto; position:sticky; top:56px; z-index:99;
}
.tab-btn {
  flex:1; min-width:60px; padding:12px 8px; border:none; background:transparent;
  font-family:inherit; font-size:12px; font-weight:500; color:#8B7355;
  cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s;
  white-space:nowrap;
}
.tab-btn.active { color:var(--caramel); border-bottom-color:var(--caramel); }

/* CONTENT */
.content { padding:16px; max-width:900px; margin:0 auto; }

/* DASHBOARD */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
.stat-card {
  background:var(--card-bg); border-radius:12px; border:1px solid var(--border);
  padding:16px 12px; text-align:center;
}
.stat-num { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; }
.stat-num.red { color:var(--red-alert); }
.stat-num.amber { color:var(--amber-alert); }
.stat-num.green { color:var(--green-ok); }
.stat-label { font-size:11px; color:#8B7355; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
.alert-section { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.alert-header { padding:12px 16px; border-bottom:1px solid var(--border); font-weight:600; font-size:14px; }
.alert-row { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; }
.alert-row:last-child { border-bottom:none; }
.alert-name { font-size:14px; font-weight:500; flex:1; }
.alert-meta { font-size:11px; color:#8B7355; }
.sync-info { background:rgba(212,168,67,0.08); border:1px solid rgba(212,168,67,0.2); border-radius:10px; padding:10px 14px; font-size:12px; color:#8B7355; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* INVENTORY */
.filter-bar { display:flex; gap:8px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
.cat-btn { background:var(--card-bg); border:1px solid var(--border); color:#8B7355; font-size:12px; padding:7px 14px; border-radius:20px; cursor:pointer; font-family:inherit; white-space:nowrap; font-weight:500; transition:all 0.2s; }
.cat-btn.active { background:var(--caramel); color:#fff; border-color:var(--caramel); }
.item-card { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); margin-bottom:10px; padding:14px 16px; }
.item-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.item-name { font-size:14px; font-weight:600; flex:1; }
.item-code { font-size:11px; color:#8B7355; }
.item-mid { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.stock-bar { background:#E8E0D5; border-radius:4px; height:6px; flex:1; min-width:80px; }
.stock-bar-fill { height:6px; border-radius:4px; transition:width 0.3s; }
.fill-green { background:var(--green-ok); }
.fill-amber { background:var(--amber-alert); }
.fill-red { background:var(--red-alert); }
.status-pill { font-size:10px; font-weight:600; padding:3px 8px; border-radius:20px; white-space:nowrap; }
.status-critical { background:rgba(192,57,43,0.12); color:var(--red-alert); }
.status-low { background:rgba(230,126,34,0.12); color:var(--amber-alert); }
.status-ok { background:rgba(39,174,96,0.12); color:var(--green-ok); }
.item-bot { display:flex; align-items:center; justify-content:space-between; }
.stock-controls { display:flex; align-items:center; gap:8px; }
.btn-adj { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--caramel); transition:all 0.15s; }
.btn-adj:active { background:var(--caramel); color:#fff; }
.stock-val { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; min-width:40px; text-align:center; }
.vendor-tag { font-size:10px; font-weight:600; padding:3px 7px; border-radius:6px; }
.vendor-karat { background:rgba(200,132,58,0.12); color:var(--caramel); }
.vendor-hyperpack { background:rgba(123,191,165,0.15); color:#3A8B6F; }
.vendor-target { background:rgba(192,57,43,0.1); color:#C0392B; }
.vendor-walmart { background:rgba(30,80,162,0.1); color:#1E50A2; }
.vendor-brand { background:rgba(139,114,85,0.12); color:#5A3E28; }
.vendor-other { background:#f0ece6; color:#8B7355; }
.par-info { font-size:11px; color:#8B7355; }
.saving-indicator { font-size:11px; color:var(--caramel); margin-left:4px; opacity:0; transition:opacity 0.3s; }
.saving-indicator.show { opacity:1; }

/* ORDER LIST */
.order-section { margin-bottom:20px; }
.order-header { font-size:15px; font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.order-card { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.order-row { padding:11px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.order-row:last-child { border-bottom:none; }
.order-name { font-size:14px; font-weight:500; }
.order-qty { font-size:13px; color:var(--caramel); font-weight:600; }
.order-code { font-size:11px; color:#8B7355; }
.btn-copy { background:var(--mocha); color:var(--gold); border:none; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; width:100%; margin-top:12px; transition:opacity 0.2s; }
.btn-copy:hover { opacity:0.9; }
.empty-order { text-align:center; padding:32px; color:#8B7355; font-size:14px; }

/* SCAN SALES */
.scan-zone {
  border:2px dashed var(--border); border-radius:14px; padding:40px 24px;
  text-align:center; cursor:pointer; transition:border-color 0.2s;
  background:var(--card-bg);
}
.scan-zone:hover { border-color:var(--caramel); }
.scan-zone-title { font-size:16px; font-weight:600; margin-bottom:6px; }
.scan-zone-sub { font-size:13px; color:#8B7355; }
#fileInput { display:none; }
.scan-results { margin-top:16px; }
.scan-result-row { padding:10px 16px; background:var(--card-bg); border-radius:10px; border:1px solid var(--border); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
.result-item { font-size:14px; font-weight:500; }
.result-sold { font-size:13px; color:var(--caramel); font-weight:600; }
.btn-apply { background:linear-gradient(135deg,var(--caramel),var(--gold)); color:#fff; border:none; padding:13px 20px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; width:100%; margin-top:12px; }
.parse-error { background:rgba(192,57,43,0.08); border:1px solid rgba(192,57,43,0.2); border-radius:10px; padding:12px 16px; font-size:13px; color:var(--red-alert); margin-top:12px; }

/* LOG DELIVERY */
.delivery-form { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); padding:16px; margin-bottom:20px; }
.delivery-form h3 { font-size:15px; font-weight:700; margin-bottom:14px; }
.form-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
.form-row select, .form-row input {
  flex:1; min-width:120px; padding:10px 12px; border-radius:8px;
  border:1px solid var(--border); background:var(--cream); font-family:inherit; font-size:14px; color:var(--dark); outline:none;
}
.btn-log { background:var(--mocha); color:var(--gold); border:none; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; width:100%; transition:opacity 0.2s; }
.btn-log:hover { opacity:0.9; }
.delivery-history { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.delivery-history h3 { padding:12px 16px; font-size:14px; font-weight:700; border-bottom:1px solid var(--border); }
.del-row { padding:11px 16px; border-bottom:1px solid var(--border); }
.del-row:last-child { border-bottom:none; }
.del-row-top { font-size:14px; font-weight:500; }
.del-row-bot { font-size:12px; color:#8B7355; margin-top:2px; }
.empty-state { text-align:center; padding:24px; color:#8B7355; font-size:13px; }

/* OWNER DASHBOARD */
.owner-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; margin-bottom:20px; }
.store-card { background:var(--card-bg); border-radius:14px; border:1px solid var(--border); padding:18px; }
.store-card-name { font-size:16px; font-weight:700; margin-bottom:4px; }
.store-card-sub { font-size:12px; color:#8B7355; margin-bottom:14px; }
.store-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.store-stat { text-align:center; }
.store-stat-num { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; }
.store-stat-label { font-size:10px; color:#8B7355; text-transform:uppercase; letter-spacing:0.5px; }

/* Toast */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--dark); color:var(--cream); padding:10px 20px; border-radius:10px;
  font-size:13px; font-weight:500; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* NAV BAR (mobile) */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; background:var(--card-bg);
  border-top:1px solid var(--border); display:flex; z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn { flex:1; padding:10px 4px 8px; border:none; background:transparent; cursor:pointer; font-family:inherit; color:#8B7355; font-size:10px; display:flex; flex-direction:column; align-items:center; gap:3px; transition:color 0.2s; }
.nav-btn.active { color:var(--caramel); }
.nav-icon { font-size:20px; }
.main-content { padding-bottom:70px; }

/* Spinner */
.spinner { width:20px; height:20px; border:2px solid rgba(253,246,236,0.2); border-top-color:var(--caramel); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Search bar */
.search-bar { width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:var(--card-bg); font-family:inherit; font-size:14px; outline:none; margin-bottom:12px; }

@media(min-width:600px){
  .stat-grid { grid-template-columns:repeat(3,1fr); }
  .tabs { position:sticky; }
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Dumont</div>
    <div class="login-sub">Creamery &amp; Café — Inventory</div>
    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">Dumont</div>
    <div class="header-right">
      <div class="store-badge" id="storeBadge">Loading...</div>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <!-- Owner store switcher (admin only) -->
  <div class="owner-toggle-bar" id="ownerBar" style="display:none">
    <button class="store-tab-btn active" onclick="switchViewStore('all')" id="storeAll">📊 All Stores</button>
    <button class="store-tab-btn" onclick="switchViewStore('coppell')" id="storeCoppell">Coppell</button>
    <button class="store-tab-btn" onclick="switchViewStore('frisco')" id="storeFrisco">Frisco</button>
    <button class="store-tab-btn" onclick="switchViewStore('cedar-park')" id="storeCedar">Cedar Park</button>
    <button class="store-tab-btn" onclick="switchViewStore('san-jose')" id="storeSJ">San Jose</button>
  </div>

  <div class="tabs" id="tabBar">
    <button class="tab-btn active" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" onclick="showTab('inventory')">📦 Inventory</button>
    <button class="tab-btn" onclick="showTab('orders')">🛒 Orders</button>
    <button class="tab-btn" onclick="showTab('scan')">📷 Sales</button>
    <button class="tab-btn" onclick="showTab('delivery')">🚚 Delivery</button>
  </div>

  <div class="main-content">
    <div class="content">

      <!-- DASHBOARD -->
      <div id="tab-dashboard">
        <div id="ownerAllView" style="display:none">
          <div style="margin-bottom:14px;font-size:13px;color:#8B7355;">All Stores — Live Overview</div>
          <div class="owner-grid" id="ownerGrid"></div>
        </div>
        <div id="storeView">
          <div class="sync-info" id="syncInfo">⏱ Loading data...</div>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-num red" id="statCritical">0</div><div class="stat-label">🔴 Order Now</div></div>
            <div class="stat-card"><div class="stat-num amber" id="statLow">0</div><div class="stat-label">🟡 Running Low</div></div>
            <div class="stat-card"><div class="stat-num green" id="statOk">0</div><div class="stat-label">🟢 OK</div></div>
          </div>
          <div class="alert-section" id="alertSection"></div>
        </div>
      </div>

      <!-- INVENTORY -->
      <div id="tab-inventory" style="display:none">
        <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Search items..." oninput="renderInventory()">
        <div class="filter-bar" id="filterBar"></div>
        <div id="inventoryList"></div>
      </div>

      <!-- ORDERS -->
      <div id="tab-orders" style="display:none">
        <div id="ordersContent"></div>
      </div>

      <!-- SCAN SALES -->
      <div id="tab-scan" style="display:none">
        <div class="scan-zone" onclick="document.getElementById('fileInput').click()">
          <div style="font-size:36px;margin-bottom:8px;">📊</div>
          <div class="scan-zone-title">Upload Clover Sales Report</div>
          <div class="scan-zone-sub">Tap to select Excel file (.xlsx) or image/PDF<br><small style="color:#aaa">Accepted: .xlsx, .xls, .csv, image, PDF</small></div>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,image/*,.pdf" onchange="handleFile(event)">
        </div>
        <div id="scanResults"></div>
      </div>

      <!-- DELIVERY -->
      <div id="tab-delivery" style="display:none">
        <div class="delivery-form">
          <h3>Log a Delivery</h3>
          <div class="form-row">
            <select id="delivItem">
              <option value="">— Select item —</option>
            </select>
          </div>
          <div class="form-row">
            <input type="number" id="delivQty" placeholder="Quantity received" min="0" step="0.5">
            <input type="text" id="delivNote" placeholder="Note (optional)">
          </div>
          <button class="btn-log" onclick="logDelivery()">+ Log Delivery</button>
        </div>
        <div class="delivery-history">
          <h3>Delivery Log</h3>
          <div id="deliveryList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDKs -->
<script type="module">

  "sanjose@dumont.com":          { store: "san-jose", role: "manager", name: "San Jose Manager" },

const STORES = {
  "coppell":    { name: "Coppell", city: "Coppell, TX" },
  "frisco":     { name: "Frisco",  city: "Frisco, TX" },

let currentUser = null;
let currentUserConfig = null;
let inventory = [];

// ── AUTH ──
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!email || !pw) { errEl.textContent = 'Please enter email and password'; return; }
  try {
    document.querySelector('.btn-login').innerHTML = '<span class="spinner"></span>';
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    document.querySelector('.btn-login').textContent = 'Sign In';
    errEl.textContent = e.code === 'auth/invalid-credential' ? 'Invalid email or password' : e.message;
  }
};

window.doLogout = async function() {
  if (unsubscribeInventory) unsubscribeInventory();
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    const cfg = USERS[user.email] || { store: 'coppell', role: 'manager', name: user.email };
    currentUserConfig = cfg;
    viewingStore = cfg.store;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('storeBadge').textContent = cfg.role === 'owner' ? '👑 Owner' : (STORES[cfg.store]?.name || cfg.store);
    if (cfg.role === 'owner') {
      document.getElementById('ownerBar').style.display = 'flex';
    }
    await initStore(cfg.store);
    populateDelivSelect();
    renderInventory();
    renderOrders();
    renderDelivery();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

async function initStore(storeId) {
  if (unsubscribeInventory) unsubscribeInventory();
  // Load inventory from Firestore, fallback to defaults
  const docRef = doc(db, 'stores', storeId, 'inventory', 'stock');
  const snap = await getDoc(docRef);
  const stockMap = snap.exists() ? snap.data() : {};
  inventory = DEFAULT_INVENTORY.map(item => ({
    ...item,
    stock: stockMap[String(item.id)] !== undefined ? stockMap[String(item.id)] : 0
  }));
  // Real-time listener
  unsubscribeInventory = onSnapshot(docRef, (snap) => {
    const data = snap.exists() ? snap.data() : {};
    inventory.forEach(item => {
      if (data[String(item.id)] !== undefined) item.stock = data[String(item.id)];
    });
    renderDashboard();
    renderInventory();
    renderOrders();
    const t = new Date().toLocaleTimeString();
    document.getElementById('syncInfo').innerHTML = `🔄 Live sync — last update: ${t}`;
  });
  // Load delivery history
  try {
    const delRef = collection(db, 'stores', storeId, 'deliveries');
    const delQ = query(delRef, orderBy('timestamp','desc'));
    const delSnap = await getDocs(delQ);
    deliveryHistory = delSnap.docs.map(d => d.data());
  } catch(e) { deliveryHistory = []; }
  renderDashboard();
  renderDelivery();
  document.getElementById('syncInfo').innerHTML = `🔄 Live sync active — ${STORES[storeId]?.name || storeId}`;
}

async function saveStock() {
  try {
    const storeId = viewingStore;
    const stockMap = {};
    inventory.forEach(item => { stockMap[String(item.id)] = item.stock; });
    await setDoc(doc(db, 'stores', storeId, 'inventory', 'stock'), stockMap);
  } catch(e) { showToast('⚠️ Save failed — check connection'); }
}

window.switchViewStore = async function(storeId) {
  document.querySelectorAll('.store-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(storeId === 'all' ? 'storeAll' : 'store' + storeId.replace('-','').replace('-','').charAt(0).toUpperCase() + storeId.replace('-','').replace('-','').slice(1))?.classList.add('active');
  if (storeId === 'all') {
    document.getElementById('ownerAllView').style.display = 'block';

    viewingStore = storeId;
    document.getElementById('storeBadge').textContent = '👑 ' + (STORES[storeId]?.name || storeId);
    await initStore(storeId);

    renderOrders();
    renderDelivery();

};

async function loadAllStores() {
  const grid = document.getElementById('ownerGrid');
  grid.innerHTML = '<div style="color:#8B7355;font-size:13px;padding:8px;">Loading all stores...</div>';
  const storeIds = Object.keys(STORES);
  const results = [];
  for (const sid of storeIds) {
    try {
      const snap = await getDoc(doc(db, 'stores', sid, 'inventory', 'stock'));
      const stockMap = snap.exists() ? snap.data() : {};
      const inv = DEFAULT_INVENTORY.map(item => ({
        ...item, stock: stockMap[String(item.id)] !== undefined ? stockMap[String(item.id)] : 0
      }));
      const critical = inv.filter(i => getStatus(i) === 'critical').length;
      const low = inv.filter(i => getStatus(i) === 'low').length;
      const ok = inv.filter(i => getStatus(i) === 'ok').length;
      results.push({ sid, critical, low, ok });
    } catch(e) {
      results.push({ sid, critical:0, low:0, ok:0 });
    }
  }
  grid.innerHTML = results.map(r => `
    <div class="store-card" onclick="window.switchViewStore('${r.sid}')" style="cursor:pointer">
      <div class="store-card-name">${STORES[r.sid].name}</div>
      <div class="store-card-sub">${STORES[r.sid].city} — tap to manage</div>
      <div class="store-stats">
        <div class="store-stat"><div class="store-stat-num red">${r.critical}</div><div class="store-stat-label">Critical</div></div>
        <div class="store-stat"><div class="store-stat-num amber">${r.low}</div><div class="store-stat-label">Low</div></div>
        <div class="store-stat"><div class="store-stat-num green">${r.ok}</div><div class="store-stat-label">OK</div></div>
      </div>
    </div>`).join('');
}

// ── HELPERS ──
function getStatus(item) {
  if (item.stock === 0) return 'critical';
  if (item.stock <= item.par * 0.5) return 'critical';
  if (item.stock <= item.par) return 'low';
  return 'ok';
}
function statusPill(s) {
  if (s==='critical') return '<span class="status-pill status-critical">🔴 ORDER NOW</span>';
  if (s==='low') return '<span class="status-pill status-low">🟡 Low</span>';
  return '<span class="status-pill status-ok">🟢 OK</span>';
}
function vendorTag(v) {
  const map = {KARAT:'vendor-karat',HYPERPACK:'vendor-hyperpack',Target:'vendor-target',Walmart:'vendor-walmart',Brand:'vendor-brand',DUMONT:'vendor-brand'};
  return `<span class="vendor-tag ${map[v]||'vendor-other'}">${v}</span>`;
}
function stockBar(item) {
  const pct = Math.min(100,(item.stock/(item.par*2))*100);
  const s = getStatus(item);
  const cls = s==='ok'?'fill-green':s==='low'?'fill-amber':'fill-red';
  return `<div class="stock-bar"><div class="stock-bar-fill ${cls}" style="width:${pct}%"></div></div>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── TABS ──
window.showTab = function(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  activeTab = tab;
  if (tab==='dashboard') renderDashboard();
  if (tab==='inventory') renderInventory();
  if (tab==='orders') renderOrders();
  if (tab==='delivery') renderDelivery();
};

// ── DASHBOARD ──
function renderDashboard() {
  const critical = inventory.filter(i=>getStatus(i)==='critical');
  const low = inventory.filter(i=>getStatus(i)==='low');
  const ok = inventory.filter(i=>getStatus(i)==='ok');
  document.getElementById('statCritical').textContent = critical.length;
  document.getElementById('statLow').textContent = low.length;
  document.getElementById('statOk').textContent = ok.length;
  const alerts = [...critical,...low];
  const el = document.getElementById('alertSection');
  if (!alerts.length) {
    el.innerHTML = '<div class="empty-state" style="padding:32px;text-align:center;color:#8B7355;">✅ All items are well stocked!</div>';
    return;
  }
  el.innerHTML = '<div class="alert-header">Items Needing Attention (' + alerts.length + ')</div>' +
    alerts.map(i=>`<div class="alert-row">${statusPill(getStatus(i))}<div class="alert-name">${i.name}</div><div class="alert-meta">${i.stock} ${i.uom} | Par: ${i.par}</div></div>`).join('');
}

// ── INVENTORY ──
function renderInventory() {
  const cats = ['all',...[...new Set(inventory.map(i=>i.cat))]];
  const filterEl = document.getElementById('filterBar');
  filterEl.innerHTML = cats.map(c=>`<button class="cat-btn ${activeCategory===c?'active':''}" onclick="setCategory('${c}')">${c==='all'?'All':c}</button>`).join('');
  const search = (document.getElementById('searchBar')?.value||'').toLowerCase();
  const filtered = inventory.filter(i=>{
    const catMatch = activeCategory==='all' || i.cat===activeCategory;
    const searchMatch = !search || i.name.toLowerCase().includes(search) || i.code.toLowerCase().includes(search);
    return catMatch && searchMatch;
  });
  const list = document.getElementById('inventoryList');
  list.innerHTML = filtered.map(item => {
    const s = getStatus(item);
    const pct = Math.min(100,(item.stock/(item.par*2))*100);
    const cls = s==='ok'?'fill-green':s==='low'?'fill-amber':'fill-red';
    return `<div class="item-card" id="card-${item.id}">
      <div class="item-top">
        <span class="item-name">${item.name}</span>
        <span id="pill-${item.id}">${statusPill(s)}</span>
      </div>
      <div class="item-mid">
        <div class="stock-bar" style="flex:1"><div class="stock-bar-fill ${cls}" id="bar-${item.id}" style="width:${pct}%"></div></div>
        ${vendorTag(item.vendor)}
      </div>
      <div class="item-bot">
        <div class="stock-controls">
          <button class="btn-adj" onclick="adjustStock(${item.id},-1)">−</button>
          <span class="stock-val" id="sv-${item.id}">${item.stock}</span>
          <button class="btn-adj" onclick="adjustStock(${item.id},1)">+</button>
        </div>
        <div style="text-align:right">
          <div class="par-info">Par: ${item.par} ${item.uom}</div>
          <div style="font-size:10px;color:#aaa">${item.code}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}
window.setCategory = function(cat) { activeCategory=cat; renderInventory(); };

let saveTimer = null;
window.adjustStock = function(id, delta) {
  const item = inventory.find(i=>i.id===id);
  if (!item) return;
  item.stock = Math.max(0, Math.round((item.stock + delta) * 10) / 10);
  // Update in place
  document.getElementById('sv-'+id).textContent = item.stock;
  const s = getStatus(item);
  document.getElementById('pill-'+id).innerHTML = statusPill(s);
  const pct = Math.min(100,(item.stock/(item.par*2))*100);
  const cls = s==='ok'?'fill-green':s==='low'?'fill-amber':'fill-red';
  const bar = document.getElementById('bar-'+id);
  if (bar) { bar.style.width=pct+'%'; bar.className='stock-bar-fill '+cls; }
  renderDashboard();
  renderOrders();
  // Debounced cloud save
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ saveStock(); showToast('💾 Saved to cloud'); }, 1200);
};

// ── ORDERS ──
function renderOrders() {
  const karat = inventory.filter(i=>getStatus(i)!=='ok' && i.vendor==='KARAT');
  const hyperpack = inventory.filter(i=>getStatus(i)!=='ok' && i.vendor==='HYPERPACK');
  const grocery = inventory.filter(i=>getStatus(i)!=='ok' && ['Target','Walmart','Indian Store','Costco'].includes(i.vendor));
  const brand = inventory.filter(i=>getStatus(i)!=='ok' && i.vendor==='Brand');
  const el = document.getElementById('ordersContent');
  if (!karat.length && !grocery.length && !brand.length && !hyperpack.length) {
    el.innerHTML = '<div class="empty-order">🎉 Nothing to order — all items are stocked!</div>';
    return;
  }
  let html = '';
  const section = (title, items, id) => {
    if (!items.length) return '';
    return `<div class="order-section">
      <div class="order-header">${title} <span style="font-size:12px;color:#8B7355;font-weight:400">(${items.length} items)</span></div>
      <div class="order-card" id="${id}">
        ${items.map(i=>`<div class="order-row"><div><div class="order-name">${i.name}</div><div class="order-code">${i.code}</div></div><div class="order-qty">${i.order_qty}</div></div>`).join('')}
      </div>
      <button class="btn-copy" onclick="copyOrder('${id}','${title}')">📋 Copy ${title} Order</button>
    </div>`;
  };
  html += section('🧋 Karat Order', karat, 'order-karat');
  html += section('📦 Hyperpack Order', hyperpack, 'order-hyperpack');
  html += section('🛒 Grocery List', grocery, 'order-grocery');
  html += section('🍦 Brand Ice Cream', brand, 'order-brand');
  el.innerHTML = html;
}
window.copyOrder = function(sectionId, title) {
  const rows = document.querySelectorAll('#'+sectionId+' .order-row');
  let text = title + ' — ' + new Date().toLocaleDateString() + '\n\n';
  rows.forEach(r=>{
    const name = r.querySelector('.order-name')?.textContent||'';
    const code = r.querySelector('.order-code')?.textContent||'';
    const qty = r.querySelector('.order-qty')?.textContent||'';
    text += `• ${name} (${code}) — ${qty}\n`;
  });
  navigator.clipboard.writeText(text).then(()=>showToast('✅ Copied to clipboard!')).catch(()=>showToast('⚠️ Copy failed'));
};

// ── SCAN SALES ──
window.handleFile = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('scanResults').innerHTML = '<div style="text-align:center;padding:24px;color:#8B7355;">⏳ Processing file...</div>';
  const ext = file.name.split('.').pop().toLowerCase();
  if (['xlsx','xls','csv'].includes(ext)) {
    parseExcelFile(file);
  } else {
    document.getElementById('scanResults').innerHTML = `<div class="parse-error">Image/PDF parsing requires manual entry. Excel (.xlsx) is recommended for automatic parsing.</div>
    <div style="margin-top:16px">${buildManualEntry()}</div>`;
  }
  e.target.value = '';
};
function parseExcelFile(file) {
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  script.onload = () => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        let nameCol=-1, soldCol=-1, headerRow=-1;
        for (let r=0;r<Math.min(20,rows.length);r++) {
          const row = rows[r].map(c=>String(c).toLowerCase());
          const ni = row.findIndex(c=>c.includes('item')||c.includes('name'));
          const si = row.findIndex(c=>c.includes('sold')||c.includes('qty')||c.includes('quantity'));
          if (ni>=0 && si>=0) { nameCol=ni; soldCol=si; headerRow=r; break; }
        }
        const sales = [];
        if (nameCol>=0) {
          for (let r=headerRow+1;r<rows.length;r++) {
            const row = rows[r];
            const name = String(row[nameCol]||'').trim();
            const sold = parseInt(row[soldCol])||0;
            if (name && sold>0 && RECIPES[name]) sales.push({name,sold});
          }
        }
        if (sales.length) {
          pendingScan = sales;
          renderScanResults(sales);
        } else {
          document.getElementById('scanResults').innerHTML = `<div class="parse-error">Could not auto-match items to recipes. Try manual entry below.</div><div style="margin-top:12px">${buildManualEntry()}</div>`;
        }
      } catch(err) {
        document.getElementById('scanResults').innerHTML = `<div class="parse-error">Parse error: ${err.message}</div>`;
      }
    };
    reader.readAsArrayBuffer(file);
  };
  document.head.appendChild(script);
}
function renderScanResults(sales) {
  document.getElementById('scanResults').innerHTML = `
    <div style="margin-top:16px">
      <div style="font-size:14px;font-weight:600;margin-bottom:10px;">Matched ${sales.length} items with recipes:</div>
      ${sales.map(s=>`<div class="scan-result-row"><span class="result-item">${s.name}</span><span class="result-sold">×${s.sold} sold</span></div>`).join('')}
      <button class="btn-apply" onclick="applyScan()">⚡ Deduct from Inventory</button>
    </div>`;
}
function buildManualEntry() { return '<div style="color:#8B7355;font-size:13px;text-align:center;padding:12px;">Manual entry coming soon.</div>'; }
window.applyScan = async function() {
  if (!pendingScan) return;
  let deducted = 0;
  pendingScan.forEach(({name,sold}) => {
    const recipe = RECIPES[name];
    if (!recipe) return;
    recipe.forEach(({id,a}) => {
      const item = inventory.find(i=>i.id===id);
      if (item) { item.stock = Math.max(0, Math.round((item.stock - a*sold)*100)/100); deducted++; }
    });
  });
  await saveStock();
  pendingScan = null;
  document.getElementById('scanResults').innerHTML = '';
  renderDashboard(); renderInventory(); renderOrders();
  showToast(`✅ Applied! ${deducted} ingredient adjustments saved`);
};

// ── DELIVERY ──
function populateDelivSelect() {
  const sel = document.getElementById('delivItem');
  sel.innerHTML = '<option value="">— Select item —</option>' +
    inventory.map(i=>`<option value="${i.id}">${i.name} (${i.uom})</option>`).join('');
}
function renderDelivery() {
  const el = document.getElementById('deliveryList');
  if (!deliveryHistory.length) { el.innerHTML = '<div class="empty-state">No deliveries logged yet.</div>'; return; }
  el.innerHTML = deliveryHistory.slice(0,30).map(d=>`
    <div class="del-row">
      <div class="del-row-top">${d.itemName} — +${d.qty} ${d.uom}</div>
      <div class="del-row-bot">${d.note||''} · ${d.timeStr||''}</div>
    </div>`).join('');
}
window.logDelivery = async function() {
  const itemId = parseInt(document.getElementById('delivItem').value);
  const qty = parseFloat(document.getElementById('delivQty').value)||0;
  const note = document.getElementById('delivNote').value.trim();
  if (!itemId||qty<=0) { showToast('⚠️ Select an item and enter qty'); return; }
  const item = inventory.find(i=>i.id===itemId);
  if (!item) return;
  item.stock = Math.round((item.stock + qty)*10)/10;
  const entry = {
    itemId, itemName:item.name, qty, uom:item.uom, note,
    timeStr: new Date().toLocaleString(), timestamp: Date.now()
  };
  deliveryHistory.unshift(entry);
  try {
    await addDoc(collection(db, 'stores', viewingStore, 'deliveries'), entry);
  } catch(e) {}
  await saveStock();
  document.getElementById('delivQty').value = '';
  document.getElementById('delivNote').value = '';
  renderDashboard(); renderInventory(); renderOrders(); renderDelivery();
  showToast(`✅ +${qty} ${item.uom} of ${item.name} logged`);
};
